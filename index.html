<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa Mundial 2026 - 48 Países</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
    crossorigin="anonymous"
  />

  <style>
    /* ─── Reset & Base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bosque-oscuro:  #0D3B2B;
      --verde-profundo: #1B5E20;
      --verde-claro:    #4CAF50;
      --tierra:         #6D4C41;
      --tierra-clara:   #D4A574;
      --shadow:         0 2px 8px rgba(0, 0, 0, 0.15);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      overflow: hidden;
    }

    /* ─── Layout principal ───────────────────────────────────────── */
    .main-container {
      display: flex;
      height: 100vh;
      gap: 0;
    }

    /* ─── Contenedor del mapa ────────────────────────────────────── */
    #mapContainer {
      flex: 1;
      position: relative;
      background: #e4e4e4;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* ─── Controles flotantes sobre el mapa ─────────────────────── */
    .controls-info {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background: white;
      padding: 10px 14px;
      border-radius: 6px;
      box-shadow: var(--shadow);
      pointer-events: none;
      min-width: 130px;
    }

    .controls-info h4 {
      font-size: 12px;
      font-weight: 700;
      color: var(--bosque-oscuro);
      margin-bottom: 6px;
    }

    .controls-info p {
      font-size: 11px;
      color: #666;
      line-height: 1.8;
    }

    /* ─── Leyenda flotante ───────────────────────────────────────── */
    .legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 1000;
      background: white;
      padding: 10px 14px;
      border-radius: 6px;
      box-shadow: var(--shadow);
      min-width: 160px;
    }

    .legend-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--bosque-oscuro);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #555;
      margin-bottom: 3px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ─── Panel lateral (lista + info) ──────────────────────────── */
    .side-panels {
      width: 500px;
      display: flex;
      box-shadow: -2px 0 12px rgba(0, 0, 0, 0.12);
      z-index: 10;
    }

    /* ── Lista de países ─────────────────────────────────────────── */
    #countriesList {
      width: 200px;
      background: white;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e0e0e0;
    }

    .list-header {
      padding: 16px;
      background: linear-gradient(160deg, var(--bosque-oscuro), var(--verde-profundo));
      color: white;
      flex-shrink: 0;
    }

    .list-header h3 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .list-header span {
      font-size: 10px;
      opacity: 0.75;
    }

    /* ── Tabs ────────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      cursor: pointer;
      border: none;
      background: #fafafa;
      font-size: 12px;
      color: #777;
      transition: background 0.15s, color 0.15s;
    }

    .tab-btn:hover { background: #f0f0f0; }

    .tab-btn.active {
      color: var(--bosque-oscuro);
      background: white;
      font-weight: 600;
      border-bottom: 2px solid var(--verde-claro);
    }

    /* ── Scroll de países ────────────────────────────────────────── */
    .countries-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
      display: none;
    }

    .countries-scroll.active { display: block; }

    /* ── Scroll de grupos ────────────────────────────────────────── */
    .groups-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
      display: none;
    }

    .groups-scroll.active { display: block; }

    /* ── Ítem de país ────────────────────────────────────────────── */
    .country-item {
      padding: 10px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      border-left: 3px solid transparent;
      border-radius: 0 4px 4px 0;
      transition: background 0.12s, border-left-color 0.12s;
    }

    .country-item:hover {
      background: #f0f0f0;
      border-left-color: var(--bosque-oscuro);
    }

    .country-item.active {
      background: #e8f5e9;
      border-left-color: var(--verde-claro);
      font-weight: 600;
    }

    .country-item-emoji { font-size: 14px; min-width: 16px; }

    .country-item-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }

    .country-item-code {
      font-size: 9px;
      color: #999;
      background: #e0e0e0;
      padding: 1px 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Grupos ──────────────────────────────────────────────────── */
    .group {
      margin-bottom: 6px;
      background: #fafafa;
      border-radius: 4px;
      border: 1px solid #e8e8e8;
      overflow: hidden;
    }

    .group-name {
      padding: 8px 10px;
      background: var(--bosque-oscuro);
      color: white;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: 600;
    }

    .group-name:hover { background: var(--verde-profundo); }

    .group-toggle {
      display: inline-block;
      transition: transform 0.2s;
      font-style: normal;
    }

    .group-toggle.collapsed { transform: rotate(-90deg); }

    .group-items {
      padding: 0;
      max-height: 500px;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .group-items.collapsed { max-height: 0; }

    /* ── Panel de información ────────────────────────────────────── */
    #infoPanel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 16px;
      border-bottom: 1px solid #e8e8e8;
      background: #fafafa;
      position: sticky;
      top: 0;
      flex-shrink: 0;
    }

    .panel-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--bosque-oscuro);
      margin-bottom: 2px;
    }

    .panel-header p {
      font-size: 11px;
      color: #888;
    }

    .panel-content {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
    }

    .placeholder {
      text-align: center;
      padding: 40px 20px;
      color: #bbb;
    }

    .placeholder p { font-size: 13px; margin-top: 8px; }

    /* ── Tarjeta de información del país ─────────────────────────── */
    .info-card { display: flex; flex-direction: column; gap: 12px; }

    .info-flag {
      font-size: 48px;
      text-align: center;
      padding: 16px 0 8px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 12px;
    }

    .info-row:last-child { border-bottom: none; }

    .info-label { color: #888; }
    .info-value { font-weight: 600; color: #333; }

    .info-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      background: var(--verde-claro);
      color: white;
    }

    .info-coords {
      font-family: monospace;
      font-size: 11px;
      color: #666;
      background: #f5f5f5;
      padding: 6px 8px;
      border-radius: 4px;
    }

    /* ─── Animaciones de marcadores ──────────────────────────────── */
    @keyframes pulse-glow {
      0%,  100% {
        filter: drop-shadow(0 0 4px var(--verde-claro))
                drop-shadow(0 0 8px var(--verde-claro));
        opacity: 1;
      }
      50% {
        filter: drop-shadow(0 0 8px var(--verde-claro))
                drop-shadow(0 0 12px var(--verde-claro));
        opacity: 0.8;
      }
    }

    @keyframes blink {
      0%,  100% { opacity: 1; }
      50%        { opacity: 0.5; }
    }

    .marker-pulse { animation: pulse-glow 1.5s ease-in-out infinite; }
    .marker-blink { animation: blink 0.8s ease-in-out infinite; }

    /* ─── Scrollbar personalizada ────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f5f5f5; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #aaa; }
  </style>
</head>

<body>

  <!-- ═══════════════════════════════════════════════════════════════
       CONTENEDOR PRINCIPAL
  ════════════════════════════════════════════════════════════════ -->
  <div class="main-container">

    <!-- ── Mapa ────────────────────────────────────────────────── -->
    <div id="mapContainer">

      <!-- Lienzo del mapa Leaflet -->
      <div id="map"></div>

      <!-- Controles de navegación flotantes -->
      <div class="controls-info" aria-label="Instrucciones de navegación">
        <h4>🗺️ Navega</h4>
        <p>
          🖱️ Arrastra el mapa<br>
          🔍 Zoom con rueda<br>
          👆 Click en país
        </p>
      </div>

      <!-- Leyenda del mapa -->
      <div class="legend" aria-label="Leyenda del mapa">
        <div class="legend-title">Leyenda</div>
        <div class="legend-item">
          <span class="legend-dot" style="background: var(--verde-claro);"></span>
          <span>📍 48 Países</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot" style="background: #f0a500;"></span>
          <span>Pendiente</span>
        </div>
      </div>

    </div><!-- /mapContainer -->

    <!-- ── Paneles laterales ──────────────────────────────────── -->
    <div class="side-panels">

      <!-- Lista de países / grupos -->
      <div id="countriesList" aria-label="Lista de países participantes">

        <div class="list-header">
          <h3>⚽ MUNDIAL 2026</h3>
          <span>48 países participantes</span>
        </div>

        <!-- Tabs de navegación -->
        <div class="tabs" role="tablist">
          <button
            class="tab-btn active"
            role="tab"
            aria-selected="true"
            aria-controls="paises-tab"
            onclick="switchTab('paises')"
          >País</button>
          <button
            class="tab-btn"
            role="tab"
            aria-selected="false"
            aria-controls="grupos-tab"
            onclick="switchTab('grupos')"
          >Grupos</button>
        </div>

        <!-- Tab: lista alfabética de países -->
        <div class="countries-scroll active" id="paises-tab" role="tabpanel">
          <div id="countriesScroll">
            <!-- Generado por mapa.js -->
          </div>
        </div>

        <!-- Tab: países agrupados por grupo -->
        <div class="groups-scroll" id="grupos-tab" role="tabpanel">
          <div id="groupsScroll">
            <!-- Generado por mapa.js -->
          </div>
        </div>

      </div><!-- /countriesList -->

      <!-- Panel de información del país seleccionado -->
      <div id="infoPanel" aria-label="Información del país seleccionado">

        <div class="panel-header">
          <h2>⚽ País</h2>
          <p>Selecciona un país para ver sus detalles</p>
        </div>

        <div class="panel-content">
          <div class="placeholder" id="placeholder">
            <div style="font-size: 40px;">👈</div>
            <p>Elige un país del mapa<br>o de la lista lateral</p>
          </div>
          <!-- La tarjeta de info se inyecta aquí por mapa.js -->
        </div>

      </div><!-- /infoPanel -->

    </div><!-- /side-panels -->

  </div><!-- /main-container -->

  <!-- ═══════════════════════════════════════════════════════════════
       SCRIPTS
       Orden importante: Leaflet → Firebase config → lógica del mapa
  ════════════════════════════════════════════════════════════════ -->

  <!-- Leaflet JS -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"
    crossorigin="anonymous"
  ></script>

  <!-- Firebase (config → lógica del mapa) -->
  <script type="module" src="js/config-firebase.js"></script>
  <script type="module" src="js/mapa.js"></script>

  <!-- Inicialización y utilidades de UI (no-module, acceso global) -->
  <script>
    /**
     * switchTab — Alterna entre el tab "País" y "Grupos"
     * @param {'paises'|'grupos'} tab
     */
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        const tabs = ['paises', 'grupos'];
        btn.classList.toggle('active', tabs[i] === tab);
        btn.setAttribute('aria-selected', tabs[i] === tab);
      });

      document.getElementById('paises-tab').classList.toggle('active', tab === 'paises');
      document.getElementById('grupos-tab').classList.toggle('active', tab === 'grupos');
    }

    /**
     * toggleGroup — Expande / colapsa un grupo en la vista de Grupos
     * @param {string} groupId
     */
    function toggleGroup(groupId) {
      const items  = document.getElementById('group-items-' + groupId);
      const toggle = document.getElementById('toggle-' + groupId);
      if (!items || !toggle) return;
      items.classList.toggle('collapsed');
      toggle.classList.toggle('collapsed');
    }

    // Disparar init() cuando el DOM esté listo
    window.addEventListener('DOMContentLoaded', () => {
      if (typeof init === 'function') init();
    });
  </script>

</body>
</html>
