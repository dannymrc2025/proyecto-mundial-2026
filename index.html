<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Mundial 2026 - 48 Países</title>
    

    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 52px);
            gap: 0;
            overflow: hidden;
        }

        #mapContainer {
            flex: 1;
            position: relative;
            background: #a8d5e5;
            overflow: hidden;
        }

        /* ── Estilos mapa D3 ──────────────────────────────────────── */
        .country { transition: fill 0.15s; }
        .country.qualified { fill: #2E7D32; cursor: pointer; }
        .country.qualified:hover { fill: #43A047; }
        .country.selected { fill: #FFC107 !important; }
        .country.other { fill: #d4d4d4; }

        #map-tooltip {
            position: absolute;
            background: rgba(13,59,43,0.92);
            color: white;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 100;
            white-space: nowrap;
        }

        .controls-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 12px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 400;
            font-size: 12px;
        }

        .controls-info h4 {
            color: #0D3B2B;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .controls-info p {
            color: #666;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 10px 12px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 400;
            font-size: 12px;
        }

        .legend p {
            margin: 4px 0;
            color: #666;
        }

        .side-panels {
            display: flex;
            width: 500px;
            background: white;
            box-shadow: -2px 0 8px rgba(0,0,0,0.1);
        }

        .countries-list {
            width: 200px;
            display: flex;
            flex-direction: column;
            background: white;
            border-right: 1px solid #e0e0e0;
        }

        .list-header {
            padding: 16px;
            background: linear-gradient(135deg, #0D3B2B 0%, #1B5E20 100%);
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
            background: #fafafa;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #0D3B2B;
            background: white;
            border-bottom-color: #0D3B2B;
        }

        .tab-btn:hover {
            background: white;
        }

        .countries-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 4px;
            display: none;
        }

        .countries-scroll.active {
            display: block;
        }

        .groups-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 4px;
            display: none;
        }

        .groups-scroll.active {
            display: block;
        }

        .country-item {
            padding: 10px 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }

        .country-item:hover {
            background: #f0f0f0;
            border-left-color: #0D3B2B;
        }

        .country-item.active {
            background: #e8f5e9;
            border-left-color: #4CAF50;
            font-weight: 600;
        }

        .country-item-emoji {
            font-size: 14px;
            min-width: 16px;
        }

        .country-item-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
        }

        .country-item-code {
            font-size: 9px;
            color: #999;
            background: #e0e0e0;
            padding: 1px 3px;
            border-radius: 2px;
        }

        .group {
            margin-bottom: 6px;
            background: #fafafa;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }

        .group-name {
            padding: 8px 10px;
            background: #0D3B2B;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            user-select: none;
        }

        .group-toggle {
            display: inline-block;
            transition: transform 0.2s;
        }

        .group-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .group-items {
            padding: 0;
            max-height: 500px;
            transition: max-height 0.3s;
            overflow: hidden;
        }

        .group-items.collapsed {
            max-height: 0;
            padding: 0;
        }

        #infoPanel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
            background: #fafafa;
            position: sticky;
            top: 0;
        }

        .panel-header h2 {
            font-size: 14px;
            color: #0D3B2B;
            margin-bottom: 4px;
        }

        .panel-header p {
            font-size: 12px;
            color: #999;
        }

        .panel-content {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
        }

        .placeholder {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 12px;
        }

        .country-card {
            background: white;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #0D3B2B 0%, #1B5E20 100%);
            color: white;
            padding: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .card-flag {
            font-size: 32px;
        }

        .card-title {
            flex: 1;
        }

        .card-title h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .card-title p {
            font-size: 11px;
            opacity: 0.9;
        }

        .card-body {
            padding: 12px;
        }

        .info-row {
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
        }

        .info-label {
            color: #888;
            font-weight: 600;
        }

        .info-value {
            color: #1a1a1a;
            text-align: right;
            flex: 1;
            margin-left: 6px;
        }

        .info-section {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
        }

        .info-section h4 {
            color: #0D3B2B;
            font-size: 11px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .ficha-message {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #4CAF50;
            font-size: 11px;
            color: #2e7d32;
            margin-top: 10px;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            margin-left: auto;
            align-self: flex-start;
            white-space: nowrap;
        }
        .status-badge.approved { background: #4CAF50; color: white; }
        .status-badge.pending  { background: #FFC107; color: #333; }
        .status-badge.rejected { background: #F44336; color: white; }

        /* Animaciones para marcadores */
        @keyframes pulse-glow {
            0%, 100% { 
                filter: drop-shadow(0 0 4px #4CAF50) drop-shadow(0 0 8px #4CAF50); 
                opacity: 1; 
            }
            50% { 
                filter: drop-shadow(0 0 8px #4CAF50) drop-shadow(0 0 12px #4CAF50); 
                opacity: 0.8; 
            }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .marker-pulse { 
            animation: pulse-glow 1.5s ease-in-out infinite; 
        }

        .marker-blink { 
            animation: blink 0.8s ease-in-out infinite; 
        }

        /* Scrollbar styling */
        .countries-scroll::-webkit-scrollbar,
        .groups-scroll::-webkit-scrollbar,
        .panel-content::-webkit-scrollbar {
            width: 6px;
        }

        .countries-scroll::-webkit-scrollbar-track,
        .groups-scroll::-webkit-scrollbar-track,
        .panel-content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .countries-scroll::-webkit-scrollbar-thumb,
        .groups-scroll::-webkit-scrollbar-thumb,
        .panel-content::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }

        .countries-scroll::-webkit-scrollbar-thumb:hover,
        .groups-scroll::-webkit-scrollbar-thumb:hover,
        .panel-content::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* ── Top Navigation Bar ─────────────────────────────────────── */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #0D3B2B 0%, #1B5E20 100%);
            color: white;
            padding: 0 16px;
            height: 52px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            flex-shrink: 0;
        }

        .nav-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .btn-alumno {
            background: #4CAF50;
            color: white;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .btn-alumno:hover {
            background: #388E3C;
            transform: translateY(-1px);
        }

        .btn-maestro {
            background: #FFC107;
            color: #0D3B2B;
            border: none;
            padding: 8px 18px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .btn-maestro:hover {
            background: #FFB300;
            transform: translateY(-1px);
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* ── Modal contraseña ──────────────────────────────────────── */
        #modalMaestro {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        #modalMaestro.visible { display: flex; }

        .modal-box {
            background: white;
            border-radius: 12px;
            padding: 28px 24px;
            width: 320px;
            max-width: 90vw;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align: center;
        }

        .modal-box h3 { color: #0D3B2B; margin-bottom: 8px; font-size: 18px; }
        .modal-box p  { color: #666; font-size: 13px; margin-bottom: 16px; }

        .modal-box input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 6px;
            margin-bottom: 16px;
        }

        .modal-box input:focus { outline: none; border-color: #1B5E20; }

        .modal-buttons { display: flex; gap: 10px; }

        .modal-btn-ok {
            flex: 1; padding: 10px;
            background: #1B5E20; color: white;
            border: none; border-radius: 6px;
            font-weight: 700; cursor: pointer; font-size: 14px;
        }

        .modal-btn-ok:hover { background: #0D3B2B; }

        .modal-btn-cancel {
            flex: 1; padding: 10px;
            background: #eee; color: #555;
            border: none; border-radius: 6px;
            font-weight: 600; cursor: pointer; font-size: 14px;
        }

        .modal-error {
            color: #c62828; font-size: 12px;
            margin-bottom: 10px; display: none;
        }

        .btn-alumno:active {
            transform: translateY(0);
        }

        /* ── Responsive Mobile ──────────────────────────────────────── */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                height: calc(100vh - 52px);
            }

            #mapContainer {
                height: 52vh;
                flex: none;
            }

            .side-panels {
                width: 100%;
                flex: 1;
                position: relative;
                bottom: auto;
                max-height: none;
                overflow: hidden;
                border-top: 2px solid #0D3B2B;
            }

            .countries-list {
                width: 160px;
            }

            /* Controles más compactos en móvil */
            .controls-info {
                top: 8px;
                left: 8px;
                padding: 6px 8px;
            }

            .controls-info h4 {
                font-size: 11px;
                margin-bottom: 4px;
            }

            /* Ocultar instrucciones de escritorio en móvil */
            .controls-info p {
                display: none;
            }

            .legend {
                bottom: 6px;
                left: 6px;
                padding: 6px 8px;
                font-size: 11px;
            }

            /* Touch targets más grandes */
            .country-item {
                padding: 13px 8px;
            }

            .country-item-name {
                font-size: 13px;
            }

            .tab-btn {
                padding: 12px 6px;
                font-size: 12px;
            }

            .list-header {
                padding: 12px;
                font-size: 13px;
            }

            .panel-header {
                padding: 10px 12px;
            }

            .panel-content {
                padding: 10px;
            }
        }

        /* ── Pantallas muy pequeñas (< 480px) ──────────────────────── */
        @media (max-width: 480px) {
            .top-nav {
                height: 48px;
            }

            .main-container {
                height: calc(100vh - 48px);
            }

            .nav-title {
                font-size: 14px;
            }

            .btn-alumno {
                padding: 7px 14px;
                font-size: 13px;
            }

            #mapContainer {
                height: 45vh;
            }

            .countries-list {
                width: 140px;
            }
        }
    </style>
</head>
<body>
    <!-- Modal contraseña maestro -->
    <div id="modalMaestro" onclick="if(event.target===this)cerrarModalMaestro()">
      <div class="modal-box">
        <h3>🎓 Módulo Maestro</h3>
        <p>Ingresa la contraseña para continuar</p>
        <input type="password" id="inputClaveMaestro" placeholder="••••"
          maxlength="20" oninput="document.getElementById('modalError').style.display='none'"
          onkeydown="if(event.key==='Enter')verificarClaveMaestro()">
        <p id="modalError" class="modal-error">❌ Contraseña incorrecta</p>
        <div class="modal-buttons">
          <button class="modal-btn-ok" onclick="verificarClaveMaestro()">Entrar</button>
          <button class="modal-btn-cancel" onclick="cerrarModalMaestro()">Cancelar</button>
        </div>
      </div>
    </div>

    <nav class="top-nav">
        <span class="nav-title">⚽ Mundial 2026</span>
        <div class="nav-buttons">
          <a href="agregar-ficha.html" class="btn-alumno">📚 Módulo Alumno</a>
          <button class="btn-maestro" onclick="abrirModalMaestro()">🎓 Maestro</button>
        </div>
    </nav>

    <div class="main-container">
        <div id="mapContainer">
            <div id="map-tooltip"></div>
            <div class="legend">
                <p><strong>🌍 48 Países</strong></p>
                <p>🟩 País clasificado</p>
                <p>🟨 País seleccionado</p>
                <p>📍 País pequeño</p>
            </div>
        </div>

        <div class="side-panels">
            <div class="countries-list">
                <div class="list-header">⚽ MUNDIAL 2026</div>
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('paises')">País</button>
                    <button class="tab-btn" onclick="switchTab('grupos')">Grupos</button>
                </div>
                <div class="countries-scroll active" id="paises-tab">
                    <div id="countriesScroll"></div>
                </div>
                <div class="groups-scroll" id="grupos-tab">
                    <div id="groupsScroll"></div>
                </div>
            </div>

            <div id="infoPanel">
                <div class="panel-header">
                    <h2>⚽ País</h2>
                    <p>Selecciona para ver detalles</p>
                </div>
                <div class="panel-content">
                    <div class="placeholder">👈 Elige un país</div>
                </div>
            </div>
        </div>
    </div>

    <!-- D3.js + TopoJSON -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson@3/dist/topojson.min.js"></script>

    <!-- Firebase SDK v9+ (modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDVLLTC-kqLBJ0Me06rqsu5BRneQiFkoE4",
            authDomain: "mundial-2026-12e6c.firebaseapp.com",
            databaseURL: "https://mundial-2026-12e6c-default-rtdb.firebaseio.com",
            projectId: "mundial-2026-12e6c",
            storageBucket: "mundial-2026-12e6c.firebasestorage.app",
            messagingSenderId: "498565136746",
            appId: "1:498565136746:web:3a73c5e92a5bdfc5726513"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Global variables
        let paises = {}, currentCountry = null;

        // Mapeo ISO numérico → código alpha-2
        const isoNumeric = {
            'MX': 484, 'ZA': 710, 'KR': 410, 'CZ': 203,
            'CA': 124, 'BA':  70, 'QA': 634, 'CH': 756,
            'BR':  76, 'MA': 504, 'HT': 332,
            'US': 840, 'PY': 600, 'AU':  36, 'TR': 792,
            'DE': 276, 'CW': 531, 'CI': 384, 'EC': 218,
            'NL': 528, 'JP': 392, 'SE': 752, 'TN': 788,
            'BE':  56, 'EG': 818, 'IR': 364, 'NZ': 554,
            'ES': 724, 'CV': 132, 'SA': 682, 'UY': 858,
            'FR': 250, 'SN': 686, 'IQ': 368, 'NO': 578,
            'AR':  32, 'DZ':  12, 'AT':  40, 'JO': 400,
            'PT': 620, 'CD': 180, 'UZ': 860, 'CO': 170,
            'GB': 826, 'HR': 191, 'GH': 288, 'PA': 591
        };
        const numericToCode = Object.fromEntries(
            Object.entries(isoNumeric).map(([a2, n]) => [n, a2])
        );

        // Datos de grupos
        const grupos = {
            'A': { nombre: 'Grupo A', paises: ['MX', 'ZA', 'KR', 'CZ'] },
            'B': { nombre: 'Grupo B', paises: ['CA', 'BA', 'QA', 'CH'] },
            'C': { nombre: 'Grupo C', paises: ['BR', 'MA', 'HT', 'SC'] },
            'D': { nombre: 'Grupo D', paises: ['US', 'PY', 'AU', 'TR'] },
            'E': { nombre: 'Grupo E', paises: ['DE', 'CW', 'CI', 'EC'] },
            'F': { nombre: 'Grupo F', paises: ['NL', 'JP', 'SE', 'TN'] },
            'G': { nombre: 'Grupo G', paises: ['BE', 'EG', 'IR', 'NZ'] },
            'H': { nombre: 'Grupo H', paises: ['ES', 'CV', 'SA', 'UY'] },
            'I': { nombre: 'Grupo I', paises: ['FR', 'SN', 'IQ', 'NO'] },
            'J': { nombre: 'Grupo J', paises: ['AR', 'DZ', 'AT', 'JO'] },
            'K': { nombre: 'Grupo K', paises: ['PT', 'CD', 'UZ', 'CO'] },
            'L': { nombre: 'Grupo L', paises: ['GB', 'HR', 'GH', 'PA'] }
        };

        // Cargar países
        async function loadPaises() {
            try {
                const response = await fetch('/data/paises.json');
                const data = await response.json();
                
                // Convertir array a objeto por código
                data.paises.forEach(pais => {
                    paises[pais.codigo] = pais;
                });

                await init();
            } catch (error) {
                console.error('Error cargando paises.json:', error);
            }
        }

        // Inicializar mapa con D3
        async function init() {
            const viewW = 960, viewH = 500;
            const tooltip = document.getElementById('map-tooltip');

            const svg = d3.select('#mapContainer')
                .append('svg')
                .attr('viewBox', `0 0 ${viewW} ${viewH}`)
                .attr('preserveAspectRatio', 'xMidYMid meet')
                .style('width', '100%')
                .style('height', '100%')
                .style('display', 'block');

            // Degradado océano
            const defs = svg.append('defs');
            const grad = defs.append('linearGradient')
                .attr('id', 'oceanGrad').attr('x1','0%').attr('y1','0%').attr('x2','0%').attr('y2','100%');
            grad.append('stop').attr('offset','0%').attr('stop-color','#c5e8f5');
            grad.append('stop').attr('offset','100%').attr('stop-color','#90c8e0');

            const projection = d3.geoNaturalEarth1().scale(153).translate([viewW/2, viewH/2]);
            const path = d3.geoPath().projection(projection);

            // Esfera — océano
            svg.append('path')
                .datum({type:'Sphere'})
                .attr('d', path)
                .attr('fill','url(#oceanGrad)')
                .attr('stroke','#7ab8d4')
                .attr('stroke-width', 0.8);

            // Graticule sutil
            svg.append('path')
                .datum(d3.geoGraticule()())
                .attr('d', path)
                .attr('fill','none')
                .attr('stroke','rgba(255,255,255,0.2)')
                .attr('stroke-width', 0.4);

            // Cargar mapa mundial
            const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
            const countries = topojson.feature(world, world.objects.countries);

            const countryPaths = svg.selectAll('.country')
                .data(countries.features)
                .join('path')
                .attr('class', d => 'country ' + (numericToCode[+d.id] ? 'qualified' : 'other'))
                .attr('d', path)
                .attr('stroke', 'white')
                .attr('stroke-width', 0.4)
                .on('mouseover', function(event, d) {
                    const c = numericToCode[+d.id];
                    if (!c) return;
                    tooltip.textContent = `${paises[c].emoji} ${paises[c].nombre}`;
                    tooltip.style.opacity = 1;
                })
                .on('mousemove', function(event) {
                    const rect = document.getElementById('mapContainer').getBoundingClientRect();
                    tooltip.style.left = (event.clientX - rect.left + 12) + 'px';
                    tooltip.style.top  = (event.clientY - rect.top  - 36) + 'px';
                })
                .on('mouseout', () => { tooltip.style.opacity = 0; })
                .on('click', (event, d) => {
                    const c = numericToCode[+d.id];
                    if (c) select(c);
                });

            // Bordes entre países
            svg.append('path')
                .datum(topojson.mesh(world, world.objects.countries, (a, b) => a !== b))
                .attr('d', path)
                .attr('fill', 'none')
                .attr('stroke', 'white')
                .attr('stroke-width', 0.3);

            // Marcadores para países pequeños / islas
            const smallCountriesData = [
                { codigo: 'SC', lat: 55.9533, lon:  -3.1883 },
                { codigo: 'HT', lat: 18.9712, lon: -72.2852 },
                { codigo: 'CW', lat: 12.1696, lon: -68.9900 },
                { codigo: 'CV', lat: 15.0557, lon: -23.6345 },
                { codigo: 'QA', lat: 25.2854, lon:  51.5310 },
            ];

            const pinCircles = {};

            smallCountriesData.forEach(({ codigo, lat, lon }) => {
                const p = paises[codigo];
                if (!p) return;
                const [x, y] = projection([lon, lat]);
                if (isNaN(x) || isNaN(y)) return;

                const g = svg.append('g')
                    .attr('transform', `translate(${x},${y})`)
                    .style('cursor', 'pointer')
                    .on('mouseover', () => {
                        tooltip.textContent = `${p.emoji} ${p.nombre}`;
                        tooltip.style.opacity = 1;
                    })
                    .on('mousemove', (event) => {
                        const rect = document.getElementById('mapContainer').getBoundingClientRect();
                        tooltip.style.left = (event.clientX - rect.left + 12) + 'px';
                        tooltip.style.top  = (event.clientY - rect.top  - 36) + 'px';
                    })
                    .on('mouseout', () => { tooltip.style.opacity = 0; })
                    .on('click', () => select(codigo));

                g.append('line')
                    .attr('x1', 0).attr('y1', -4).attr('x2', 0).attr('y2', -11)
                    .attr('stroke', 'rgba(0,0,0,0.3)').attr('stroke-width', 1.5);

                g.append('circle')
                    .attr('cy', -19).attr('r', 8)
                    .attr('fill', 'rgba(0,0,0,0.15)')
                    .attr('transform', 'translate(1,1)');

                const circle = g.append('circle')
                    .attr('cy', -19).attr('r', 8)
                    .attr('fill', '#2E7D32')
                    .attr('stroke', 'white')
                    .attr('stroke-width', 2);

                pinCircles[codigo] = circle;

                g.append('text')
                    .attr('y', -16)
                    .attr('text-anchor', 'middle')
                    .attr('dominant-baseline', 'middle')
                    .attr('font-size', '9px')
                    .style('pointer-events', 'none')
                    .text(p.emoji);
            });

            // Actualizar colores mapa + pins al seleccionar
            // ── Acceso Módulo Maestro ──────────────────────────────────────
        function abrirModalMaestro() {
            document.getElementById('inputClaveMaestro').value = '';
            document.getElementById('modalError').style.display = 'none';
            document.getElementById('modalMaestro').classList.add('visible');
            setTimeout(() => document.getElementById('inputClaveMaestro').focus(), 100);
        }

        function cerrarModalMaestro() {
            document.getElementById('modalMaestro').classList.remove('visible');
        }

        function verificarClaveMaestro() {
            const clave = document.getElementById('inputClaveMaestro').value;
            if (clave === '2707') {
                cerrarModalMaestro();
                window.location.href = 'panel-profesor.html';
            } else {
                document.getElementById('modalError').style.display = 'block';
                document.getElementById('inputClaveMaestro').value = '';
                document.getElementById('inputClaveMaestro').focus();
            }
        }

        window.abrirModalMaestro    = abrirModalMaestro;
        window.cerrarModalMaestro   = cerrarModalMaestro;
        window.verificarClaveMaestro = verificarClaveMaestro;

        window._updateMapColors = function() {
                countryPaths.attr('class', d => {
                    const c = numericToCode[+d.id];
                    if (!c) return 'country other';
                    return 'country qualified' + (c === currentCountry ? ' selected' : '');
                });
                Object.entries(pinCircles).forEach(([codigo, circle]) => {
                    circle.attr('fill', codigo === currentCountry ? '#FFC107' : '#2E7D32');
                });
            };

            renderPaises();
            renderGrupos();
        }

        // Renderizar lista de países
        function renderPaises() {
            const sorted = Object.entries(paises).sort((a, b) => 
                a[1].nombre.localeCompare(b[1].nombre, 'es')
            );

            const html = sorted.map(([codigo, pais]) => `
                <div class="country-item" data-codigo="${codigo}" onclick="select('${codigo}')">
                    <span class="country-item-emoji">${pais.emoji}</span>
                    <span class="country-item-name">${pais.nombre}</span>
                    <span class="country-item-code">${codigo}</span>
                </div>
            `).join('');

            document.getElementById('countriesScroll').innerHTML = html;
        }

        // Renderizar grupos
        function renderGrupos() {
            let html = '';
            
            Object.entries(grupos).forEach(([key, grupo]) => {
                const paisesGrupo = grupo.paises.map(codigo => {
                    const pais = paises[codigo];
                    return `
                        <div class="country-item" data-codigo="${codigo}" onclick="select('${codigo}')">
                            <span class="country-item-emoji">${pais.emoji}</span>
                            <span class="country-item-name">${pais.nombre}</span>
                            <span class="country-item-code">${codigo}</span>
                        </div>
                    `;
                }).join('');

                html += `
                    <div class="group">
                        <div class="group-name" onclick="toggleGroup(this)">
                            <span>${grupo.nombre}</span>
                            <span class="group-toggle">▼</span>
                        </div>
                        <div class="group-items">
                            ${paisesGrupo}
                        </div>
                    </div>
                `;
            });

            document.getElementById('groupsScroll').innerHTML = html;
        }

        // Cambiar tab
        window.switchTab = function(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.countries-scroll, .groups-scroll').forEach(el => el.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        };

        // Alternar grupo
        window.toggleGroup = function(element) {
            const items = element.nextElementSibling;
            const toggle = element.querySelector('.group-toggle');

            items.classList.toggle('collapsed');
            toggle.classList.toggle('collapsed');
        };

        // Limpia markdown code fence del HTML si el alumno lo pegó con backticks
        function limpiarHtml(html) {
            if (!html) return html;
            return html.replace(/^\s*```[\w]*\n?/i, '').replace(/\n?```\s*$/i, '').trim();
        }

        // Devuelve la ficha más relevante de un objeto { uid: fichaObj }
        function getMejorFicha(fichasPais) {
            if (!fichasPais || typeof fichasPais !== 'object') return null;
            const lista = Object.values(fichasPais).filter(f => f && typeof f === 'object');
            if (!lista.length) return null;
            const prio = { aprobado: 0, pendiente: 1, rechazado: 2 };
            return lista.sort((a, b) => {
                const pa = prio[a.estado] ?? 3, pb = prio[b.estado] ?? 3;
                return pa !== pb ? pa - pb : (b.timestamp || 0) - (a.timestamp || 0);
            })[0];
        }

        // Seleccionar país
        window.select = async function(codigo) {
            currentCountry = codigo;
            const pais = paises[codigo];

            // Actualizar lista lateral
            document.querySelectorAll('.country-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll(`[data-codigo="${codigo}"]`).forEach(el => {
                el.classList.add('active');
                el.scrollIntoView({ block: 'nearest' });
            });

            // Actualizar colores del mapa
            if (window._updateMapColors) window._updateMapColors();

            // Info panel base (mientras carga)
            document.querySelector('.panel-content').innerHTML = `
                <div class="country-card">
                    <div class="card-header">
                        <div class="card-flag">${pais.emoji}</div>
                        <div class="card-title">
                            <h3>${pais.nombre}</h3>
                            <p>${pais.codigo}</p>
                        </div>
                        <div id="cardStatus" class="status-badge"></div>
                    </div>
                    <div class="card-body">
                        <div class="info-row">
                            <span class="info-label">Capital</span>
                            <span class="info-value">${pais.capital}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Moneda</span>
                            <span class="info-value">${pais.moneda}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Ubicación</span>
                            <span class="info-value">${pais.ubicacion}</span>
                        </div>
                        <div id="fichaContent">
                            <div class="ficha-message" style="color:#bbb;">⏳ Cargando ficha…</div>
                        </div>
                    </div>
                </div>`;

            // Consultar Firebase
            try {
                const snapshot = await get(ref(db, `fichas/${codigo}`));
                const ficha = getMejorFicha(snapshot.val());
                if (currentCountry !== codigo) return; // cambió de país mientras cargaba

                const statusEl = document.getElementById('cardStatus');
                const fichaEl  = document.getElementById('fichaContent');

                if (!ficha) {
                    fichaEl.innerHTML = '<div class="ficha-message">📌 Ficha lista para llenar</div>';

                } else if (ficha.estado === 'aprobado') {
                    statusEl.className   = 'status-badge approved';
                    statusEl.textContent = '✓ Aprobada';
                    if (ficha.html) {
                        fichaEl.innerHTML = `
                            <div style="margin-top:10px;padding-top:10px;border-top:1px solid #e0e0e0;">
                                <p style="font-size:11px;font-weight:700;color:#0D3B2B;text-transform:uppercase;margin-bottom:6px;">📄 Ficha del país</p>
                                <iframe id="fichaIframe"
                                    style="width:100%;height:420px;border:1px solid #e0e0e0;border-radius:6px;"
                                    sandbox="allow-same-origin allow-scripts"
                                    title="Ficha del país"></iframe>
                            </div>`;
                        document.getElementById('fichaIframe').srcdoc = limpiarHtml(ficha.html);
                    } else {
                        fichaEl.innerHTML = '<div class="ficha-message">✅ Ficha aprobada.</div>';
                    }

                } else if (ficha.estado === 'pendiente') {
                    statusEl.className   = 'status-badge pending';
                    statusEl.textContent = '⏳ Pendiente';
                    fichaEl.innerHTML    = '<div class="ficha-message">⏳ Ficha enviada, en revisión por el profesor…</div>';

                } else if (ficha.estado === 'rechazado') {
                    statusEl.className   = 'status-badge rejected';
                    statusEl.textContent = '✗ Rechazada';
                    const motivo = ficha.motivoRechazo
                        ? `<p style="margin-top:6px;font-size:11px;color:#c62828;">${ficha.motivoRechazo}</p>` : '';
                    fichaEl.innerHTML = `<div class="ficha-message">⚠️ Ficha rechazada.</div>${motivo}`;
                }
            } catch(err) {
                console.error('[select] Error al obtener ficha:', err);
            }
        };

        // Cargar datos
        loadPaises();
    </script>
</body>
</html>
