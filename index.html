<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Mundial 2026 - 48 Países</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
        }

        .main-container {
            display: flex;
            height: 100vh;
            gap: 0;
            overflow: hidden;
        }

        #mapContainer {
            flex: 1;
            position: relative;
            background: #e4e4e4;
        }

        .controls-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 12px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 400;
            font-size: 12px;
        }

        .controls-info h4 {
            color: #0D3B2B;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .controls-info p {
            color: #666;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 10px 12px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 400;
            font-size: 12px;
        }

        .legend p {
            margin: 4px 0;
            color: #666;
        }

        .side-panels {
            display: flex;
            width: 500px;
            background: white;
            box-shadow: -2px 0 8px rgba(0,0,0,0.1);
        }

        .countries-list {
            width: 200px;
            display: flex;
            flex-direction: column;
            background: white;
            border-right: 1px solid #e0e0e0;
        }

        .list-header {
            padding: 16px;
            background: linear-gradient(135deg, #0D3B2B 0%, #1B5E20 100%);
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
            background: #fafafa;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #0D3B2B;
            background: white;
            border-bottom-color: #0D3B2B;
        }

        .tab-btn:hover {
            background: white;
        }

        .countries-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 4px;
            display: none;
        }

        .countries-scroll.active {
            display: block;
        }

        .groups-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 4px;
            display: none;
        }

        .groups-scroll.active {
            display: block;
        }

        .country-item {
            padding: 10px 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }

        .country-item:hover {
            background: #f0f0f0;
            border-left-color: #0D3B2B;
        }

        .country-item.active {
            background: #e8f5e9;
            border-left-color: #4CAF50;
            font-weight: 600;
        }

        .country-item-emoji {
            font-size: 14px;
            min-width: 16px;
        }

        .country-item-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
        }

        .country-item-code {
            font-size: 9px;
            color: #999;
            background: #e0e0e0;
            padding: 1px 3px;
            border-radius: 2px;
        }

        .group {
            margin-bottom: 6px;
            background: #fafafa;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }

        .group-name {
            padding: 8px 10px;
            background: #0D3B2B;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            user-select: none;
        }

        .group-toggle {
            display: inline-block;
            transition: transform 0.2s;
        }

        .group-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .group-items {
            padding: 0;
            max-height: 500px;
            transition: max-height 0.3s;
            overflow: hidden;
        }

        .group-items.collapsed {
            max-height: 0;
            padding: 0;
        }

        #infoPanel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
            background: #fafafa;
            position: sticky;
            top: 0;
        }

        .panel-header h2 {
            font-size: 14px;
            color: #0D3B2B;
            margin-bottom: 4px;
        }

        .panel-header p {
            font-size: 12px;
            color: #999;
        }

        .panel-content {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
        }

        .placeholder {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 12px;
        }

        .country-card {
            background: white;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #0D3B2B 0%, #1B5E20 100%);
            color: white;
            padding: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .card-flag {
            font-size: 32px;
        }

        .card-title {
            flex: 1;
        }

        .card-title h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .card-title p {
            font-size: 11px;
            opacity: 0.9;
        }

        .card-body {
            padding: 12px;
        }

        .info-row {
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
        }

        .info-label {
            color: #888;
            font-weight: 600;
        }

        .info-value {
            color: #1a1a1a;
            text-align: right;
            flex: 1;
            margin-left: 6px;
        }

        .info-section {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
        }

        .info-section h4 {
            color: #0D3B2B;
            font-size: 11px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .ficha-message {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #4CAF50;
            font-size: 11px;
            color: #2e7d32;
            margin-top: 10px;
        }

        /* Animaciones para marcadores */
        @keyframes pulse-glow {
            0%, 100% { 
                filter: drop-shadow(0 0 4px #4CAF50) drop-shadow(0 0 8px #4CAF50); 
                opacity: 1; 
            }
            50% { 
                filter: drop-shadow(0 0 8px #4CAF50) drop-shadow(0 0 12px #4CAF50); 
                opacity: 0.8; 
            }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .marker-pulse { 
            animation: pulse-glow 1.5s ease-in-out infinite; 
        }

        .marker-blink { 
            animation: blink 0.8s ease-in-out infinite; 
        }

        /* Scrollbar styling */
        .countries-scroll::-webkit-scrollbar,
        .groups-scroll::-webkit-scrollbar,
        .panel-content::-webkit-scrollbar {
            width: 6px;
        }

        .countries-scroll::-webkit-scrollbar-track,
        .groups-scroll::-webkit-scrollbar-track,
        .panel-content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .countries-scroll::-webkit-scrollbar-thumb,
        .groups-scroll::-webkit-scrollbar-thumb,
        .panel-content::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }

        .countries-scroll::-webkit-scrollbar-thumb:hover,
        .groups-scroll::-webkit-scrollbar-thumb:hover,
        .panel-content::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .side-panels {
                width: 100%;
                position: absolute;
                bottom: 0;
                max-height: 50vh;
                border-top: 1px solid #e0e0e0;
            }

            .main-container {
                flex-direction: column;
            }

            #mapContainer {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="mapContainer">
            <div class="controls-info">
                <h4>🗺️ Navega</h4>
                <p>🖱️ Arrastra para mover</p>
                <p>🔍 Scroll para zoom</p>
                <p>👆 Click en país</p>
            </div>
            <div class="legend">
                <p><strong>📍 48 Países</strong></p>
                <p>🟢 País disponible</p>
                <p>🟡 Ficha en revisión</p>
            </div>
        </div>

        <div class="side-panels">
            <div class="countries-list">
                <div class="list-header">⚽ MUNDIAL 2026</div>
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('paises')">País</button>
                    <button class="tab-btn" onclick="switchTab('grupos')">Grupos</button>
                </div>
                <div class="countries-scroll active" id="paises-tab">
                    <div id="countriesScroll"></div>
                </div>
                <div class="groups-scroll" id="grupos-tab">
                    <div id="groupsScroll"></div>
                </div>
            </div>

            <div id="infoPanel">
                <div class="panel-header">
                    <h2>⚽ País</h2>
                    <p>Selecciona para ver detalles</p>
                </div>
                <div class="panel-content">
                    <div class="placeholder">👈 Elige un país</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Firebase SDK v9+ (modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDVLLTC-kqLBJ0Me06rqsu5BRneQiFkoE4",
            authDomain: "mundial-2026-12e6c.firebaseapp.com",
            databaseURL: "https://mundial-2026-12e6c.firebaseio.com",
            projectId: "mundial-2026-12e6c",
            storageBucket: "mundial-2026-12e6c.firebasestorage.app",
            messagingSenderId: "498565136746",
            appId: "1:498565136746:web:3a73c5e92a5bdfc5726513"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Global variables
        let map, markers = {}, paises = {}, currentCountry = null;

        // Datos de grupos
        const grupos = {
            'A': { nombre: 'Grupo A', paises: ['MX', 'ZA', 'KR', 'CZ'] },
            'B': { nombre: 'Grupo B', paises: ['CA', 'BA', 'QA', 'CH'] },
            'C': { nombre: 'Grupo C', paises: ['BR', 'MA', 'HT', 'SC'] },
            'D': { nombre: 'Grupo D', paises: ['US', 'PY', 'AU', 'TR'] },
            'E': { nombre: 'Grupo E', paises: ['DE', 'CW', 'CI', 'EC'] },
            'F': { nombre: 'Grupo F', paises: ['NL', 'JP', 'SE', 'TN'] },
            'G': { nombre: 'Grupo G', paises: ['BE', 'EG', 'IR', 'NZ'] },
            'H': { nombre: 'Grupo H', paises: ['ES', 'CV', 'SA', 'UY'] },
            'I': { nombre: 'Grupo I', paises: ['FR', 'SN', 'IQ', 'NO'] },
            'J': { nombre: 'Grupo J', paises: ['AR', 'DZ', 'AT', 'JO'] },
            'K': { nombre: 'Grupo K', paises: ['PT', 'CD', 'UZ', 'CO'] },
            'L': { nombre: 'Grupo L', paises: ['GB', 'HR', 'GH', 'PA'] }
        };

        // Cargar países
        async function loadPaises() {
            try {
                const response = await fetch('/data/paises.json');
                const data = await response.json();
                
                // Convertir array a objeto por código
                data.paises.forEach(pais => {
                    paises[pais.codigo] = pais;
                });

                init();
            } catch (error) {
                console.error('Error cargando paises.json:', error);
            }
        }

        // Inicializar mapa
        function init() {
            // Crear mapa
            map = L.map('mapContainer').setView([20, 0], 3);

            // Tile layer
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // Crear marcadores
            Object.entries(paises).forEach(([codigo, pais]) => {
                const marker = L.circleMarker([pais.latitud, pais.longitud], {
                    radius: 7,
                    fillColor: '#2196F3',
                    color: '#fff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.85
                }).addTo(map);

                marker.bindTooltip(`${pais.emoji} ${pais.nombre}`, { permanent: true, direction: 'top' });
                marker.on('click', () => select(codigo));

                markers[codigo] = marker;
            });

            renderPaises();
            renderGrupos();
        }

        // Renderizar lista de países
        function renderPaises() {
            const sorted = Object.entries(paises).sort((a, b) => 
                a[1].nombre.localeCompare(b[1].nombre, 'es')
            );

            const html = sorted.map(([codigo, pais]) => `
                <div class="country-item" onclick="select('${codigo}')">
                    <span class="country-item-emoji">${pais.emoji}</span>
                    <span class="country-item-name">${pais.nombre}</span>
                    <span class="country-item-code">${codigo}</span>
                </div>
            `).join('');

            document.getElementById('countriesScroll').innerHTML = html;
        }

        // Renderizar grupos
        function renderGrupos() {
            let html = '';
            
            Object.entries(grupos).forEach(([key, grupo]) => {
                const paisesGrupo = grupo.paises.map(codigo => {
                    const pais = paises[codigo];
                    return `
                        <div class="country-item" onclick="select('${codigo}')">
                            <span class="country-item-emoji">${pais.emoji}</span>
                            <span class="country-item-name">${pais.nombre}</span>
                            <span class="country-item-code">${codigo}</span>
                        </div>
                    `;
                }).join('');

                html += `
                    <div class="group">
                        <div class="group-name" onclick="toggleGroup(this)">
                            <span>${grupo.nombre}</span>
                            <span class="group-toggle">▼</span>
                        </div>
                        <div class="group-items">
                            ${paisesGrupo}
                        </div>
                    </div>
                `;
            });

            document.getElementById('groupsScroll').innerHTML = html;
        }

        // Cambiar tab
        window.switchTab = function(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.countries-scroll, .groups-scroll').forEach(el => el.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        };

        // Alternar grupo
        window.toggleGroup = function(element) {
            const items = element.nextElementSibling;
            const toggle = element.querySelector('.group-toggle');

            items.classList.toggle('collapsed');
            toggle.classList.toggle('collapsed');
        };

        // Seleccionar país
        window.select = function(codigo) {
            currentCountry = codigo;
            const pais = paises[codigo];

            // Actualizar marcadores
            document.querySelectorAll('.country-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.country-item').forEach(el => {
                if (el.textContent.includes(pais.nombre)) {
                    el.classList.add('active');
                }
            });

            // Animar marcador
            Object.values(markers).forEach(marker => {
                const path = marker._path;
                if (path) {
                    path.classList.remove('marker-pulse', 'marker-blink');
                }
                marker.setRadius(7);
                marker.setStyle({ weight: 2, fillOpacity: 0.85 });
            });

            const selectedMarker = markers[codigo];
            if (selectedMarker._path) {
                selectedMarker._path.classList.add('marker-pulse', 'marker-blink');
            }
            selectedMarker.setRadius(14);
            selectedMarker.setStyle({ weight: 3, fillOpacity: 1 });

            // Zoom
            map.setView([pais.latitud, pais.longitud], 6);

            // Info panel
            const html = `
                <div class="country-card">
                    <div class="card-header">
                        <div class="card-flag">${pais.emoji}</div>
                        <div class="card-title">
                            <h3>${pais.nombre}</h3>
                            <p>${pais.codigo}</p>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="info-row">
                            <span class="info-label">Capital</span>
                            <span class="info-value">${pais.capital}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Moneda</span>
                            <span class="info-value">${pais.moneda}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Ubicación</span>
                            <span class="info-value">${pais.ubicacion}</span>
                        </div>
                        <div class="ficha-message">
                            📌 Ficha lista para llenar
                        </div>
                    </div>
                </div>
            `;

            document.querySelector('.panel-content').innerHTML = html;
        };

        // Cargar datos
        loadPaises();
    </script>
</body>
</html>
